name: ScreenLock
options:
  bundleIdPrefix: com.yugangcao
  deploymentTarget:
    macOS: "11.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
targets:
  ScreenLock:
    type: application
    platform: macOS
    sources:
      - ScreenLock
    dependencies:
      - package: Sparkle
    info:
      path: ScreenLock/App/Info.plist
      properties:
        LSUIElement: true
        NSAppleEventsUsageDescription: "ScreenLock needs permission to lock your screen at scheduled times."
        SUFeedURL: "https://raw.githubusercontent.com/Talljack/screen-lock/main/appcast.xml"
        SUPublicEDKey: "t5BuJRYkalejaR25jPfscdJxwTOjZlETDCrpwpcTl80="
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yugangcao.screenlock
      INFOPLIST_FILE: ScreenLock/App/Info.plist
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: ScreenLock/App/ScreenLock.entitlements
  ScreenLockTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/ScreenLockTests
    dependencies:
      - target: ScreenLock
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yugangcao.screenlock.tests
      GENERATE_INFOPLIST_FILE: YES
      MACOSX_DEPLOYMENT_TARGET: "11.0"
